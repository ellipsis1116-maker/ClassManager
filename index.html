<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>班级座位数据大屏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 顶部控制台 -->
    <div id="control-panel" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; padding: 10px 20px;">
        <!-- 左侧：设置与网格 -->
        <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
            <button id="settings-btn" class="btn" style="background: transparent; font-size: 20px; padding: 5px;" title="快捷键设置">⚙️</button>
            <label style="white-space: nowrap;">行: <input type="number" id="rows-input" value="7" min="1" style="width: 40px;"></label>
            <label style="white-space: nowrap;">列: <input type="number" id="cols-input" value="7" min="1" style="width: 40px;"></label>
            <button id="render-grid-btn" class="btn btn-blue">网格</button>
            <button id="align-btn" class="btn" style="background:#8b5cf6;">对齐</button>
        </div>
        
        <!-- 中间：画笔工具区 -->
        <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; flex: 1;" id="tools-container">
            <button id="lock-btn" class="btn btn-lock">🔒 锁定</button>
            <button id="all-up-btn" class="btn btn-blue" style="background:#10b981;">全班 +</button>
            <button class="btn tool-btn" data-tool="plus" style="background:#10b981;">+</button>
            <button class="btn tool-btn" data-tool="minus" style="background:#ef4444;">-</button>
            <button id="all-down-btn" class="btn btn-blue" style="background:#ef4444;">全班 -</button>
            <button class="btn tool-btn" data-tool="consume" style="background:#eab308; color: #000; font-weight: bold;">兑奖</button>
        </div>
        
        <!-- 右侧：全局操作 -->
        <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
            <button id="save-btn" class="btn" style="background:#10b981;">💾 保存</button>
            <button id="top-reset-exp" class="btn" style="background: #ef4444;">结算</button>
            <button id="top-reload-cloud" class="btn" style="background: transparent; font-size: 20px; padding: 5px;" title="重新加载">🔄</button>
        </div>
    </div>

    <!-- 鼠标跟随提示框 -->
    <div id="cursor-follower" style="display: none; position: fixed; pointer-events: none; z-index: 9999; padding: 4px 12px; border-radius: 6px; font-weight: bold; font-size: 20px; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transform: translate(15px, 15px);"></div>

    <!-- 自由大画布 -->
    <div id="canvas">
        <!-- 动态背景虚线网格 -->
        <div id="grid-layer" class="grid-overlay"></div>
        <!-- 学生卡片渲染层 -->
        <div id="cards-layer"></div>
    </div>

    <!-- 横屏提示遮罩 -->
    <div id="landscape-prompt">
        <div class="icon">📱</div>
        <h2>请旋转手机</h2>
        <p style="margin-top: 10px; color: #94a3b8;">为了获得最佳体验，请关闭方向锁定并将手机横放</p>
    </div>

    <!-- 设置弹窗 -->
    <div id="settings-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-title">快捷键设置</div>
            
            <div class="setting-item">
                <label><input type="checkbox" id="setting-arrows" checked> 启用上下左右键位</label>
            </div>
            <div class="setting-item">
                <label><input type="checkbox" id="setting-space" checked> 空格锁定/解锁</label>
            </div>
            
            <div style="margin-top: 16px; margin-bottom: 8px; font-size: 12px; color: #94a3b8;">自定键位 (默认支持 + 和 - 键)</div>
            <div class="setting-item">
                <span>加分</span>
                <input type="text" id="setting-key-up" value="Q" maxlength="1">
            </div>
            <div class="setting-item">
                <span>减分</span>
                <input type="text" id="setting-key-down" value="A" maxlength="1">
            </div>

            <div class="modal-actions">
                <button id="settings-cancel" class="btn" style="background: #475569;">取消</button>
                <button id="settings-save" class="btn btn-blue">保存</button>
            </div>
        </div>
    </div>

    <script>
        let studentsData = [];
        let selectedIndices = new Set(); 
        let lastSelectedIndex = 0;
        let hasUnsavedChanges = false; // 追踪是否有未保存的修改
        
        let activeCard = null;
        let offsetX = 0;
        let offsetY = 0;
        
        let currentTool = null; // 当前选中的画笔工具 (null 表示默认选择/拖拽模式)
        let isPainting = false; // 是否正在涂抹
        let paintedIndices = new Set(); // 记录一次涂抹中已经操作过的学生，避免重复加分
        let lastCloudDataStr = ''; // 记录上一次从云端拉取的数据字符串

        // 快捷键配置 (默认值)
        let keyConfig = {
            useArrows: true,
            useSpace: true,
            keyUp: 'q',
            keyDown: 'a'
        };

        // 拦截页面关闭/刷新
        window.addEventListener('beforeunload', (e) => {
            if (hasUnsavedChanges) {
                e.preventDefault();
                e.returnValue = '';
            }
        });

        function loadDataFromCloud() {
            return fetch('/api/students')
                .then(async response => {
                    if (!response.ok) {
                        const errText = await response.text();
                        throw new Error(`无法读取云端数据 (状态码: ${response.status}, 详情: ${errText})`);
                    }
                    return response.json();
                })
                .then(data => {
                    // 如果有未保存的本地修改，则不覆盖本地数据，避免冲突
                    if (hasUnsavedChanges) return;
                    
                    // 检查数据是否有实质性变化，避免不必要的重绘
                    const newDataStr = JSON.stringify(data);
                    if (newDataStr !== lastCloudDataStr) {
                        lastCloudDataStr = newDataStr;
                        studentsData = [];
                        parseJSON(data);
                        
                        // 如果是第一次加载，或者网格已经初始化过，则重新渲染
                        if (document.getElementById('cards-layer').children.length === 0) {
                            setupGrid();
                        } else {
                            // 重新设置网格并渲染卡片，以应用可能改变的行列数
                            setupGrid();
                        }
                    }
                })
                .catch(err => {
                    console.error('轮询读取云端数据失败:', err);
                });
        }

        window.addEventListener('DOMContentLoaded', () => {
            // 加载本地设置
            const savedConfig = localStorage.getItem('classManagerKeyConfig');
            if (savedConfig) {
                try {
                    keyConfig = { ...keyConfig, ...JSON.parse(savedConfig) };
                } catch (e) {}
            }

            // 初始加载
            loadDataFromCloud().catch(err => {
                alert('错误: ' + err.message + '\n请检查网络连接或云端配置！');
            });

            // 开启 3 秒轮询
            setInterval(loadDataFromCloud, 3000);

            document.getElementById('render-grid-btn').addEventListener('click', setupGrid);
            document.getElementById('align-btn').addEventListener('click', alignCards);
            
            // 鼠标跟随逻辑
            const follower = document.getElementById('cursor-follower');
            document.addEventListener('mousemove', (e) => {
                if (currentTool) {
                    follower.style.left = e.clientX + 'px';
                    follower.style.top = e.clientY + 'px';
                }
            });

            // 工具栏切换逻辑
            document.querySelectorAll('.tool-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation(); // 阻止冒泡到 control-panel 触发退出
                    
                    const target = e.currentTarget;
                    const tool = target.getAttribute('data-tool');
                    
                    // 如果点击的是当前已选中的工具，则取消选中（退出模式）
                    if (currentTool === tool) {
                        exitToolMode();
                        return;
                    }

                    // 切换到新工具
                    document.querySelectorAll('.tool-btn').forEach(b => {
                        b.classList.remove('active');
                        b.style.boxShadow = 'none';
                    });
                    
                    target.classList.add('active');
                    target.style.boxShadow = '0 0 0 3px #ffffff';
                    currentTool = tool;
                    clearSelection();

                    // 更新鼠标跟随提示
                    follower.style.display = 'block';
                    if (tool === 'plus') {
                        follower.innerText = '+';
                        follower.style.backgroundColor = '#10b981';
                        follower.style.color = 'white';
                    } else if (tool === 'minus') {
                        follower.innerText = '-';
                        follower.style.backgroundColor = '#ef4444';
                        follower.style.color = 'white';
                    } else if (tool === 'consume') {
                        follower.innerText = '🪙';
                        follower.style.backgroundColor = '#eab308';
                        follower.style.color = '#000';
                    }
                });
            });

            // 点击控制台空白处退出工具模式
            document.getElementById('control-panel').addEventListener('click', (e) => {
                if (e.target.id === 'control-panel' || e.target.tagName === 'DIV') {
                    exitToolMode();
                }
            });

            document.getElementById('lock-btn').addEventListener('click', toggleLock);
            document.getElementById('all-up-btn').addEventListener('click', () => handleAllScore(10));
            document.getElementById('all-down-btn').addEventListener('click', () => handleAllScore(-10));
            document.getElementById('save-btn').addEventListener('click', saveToCloud);
            
            document.getElementById('canvas').addEventListener('mousedown', (e) => {
                if (e.target.id === 'canvas' || e.target.id === 'grid-layer' || e.target.className === 'grid-cell') {
                    if (!currentTool) {
                        clearSelection();
                    }
                }
            });

            // 全局鼠标松开事件，结束涂抹
            window.addEventListener('mouseup', () => {
                isPainting = false;
                paintedIndices.clear();
            });

            // 设置弹窗逻辑
            const modal = document.getElementById('settings-modal');
            document.getElementById('settings-btn').addEventListener('click', () => {
                document.getElementById('setting-arrows').checked = keyConfig.useArrows;
                document.getElementById('setting-space').checked = keyConfig.useSpace;
                document.getElementById('setting-key-up').value = keyConfig.keyUp.toUpperCase();
                document.getElementById('setting-key-down').value = keyConfig.keyDown.toUpperCase();
                modal.classList.add('show');
            });
            document.getElementById('settings-cancel').addEventListener('click', () => {
                modal.classList.remove('show');
            });
            document.getElementById('settings-save').addEventListener('click', () => {
                keyConfig.useArrows = document.getElementById('setting-arrows').checked;
                keyConfig.useSpace = document.getElementById('setting-space').checked;
                
                let upKey = document.getElementById('setting-key-up').value.trim().toLowerCase();
                let downKey = document.getElementById('setting-key-down').value.trim().toLowerCase();
                if (upKey) keyConfig.keyUp = upKey;
                if (downKey) keyConfig.keyDown = downKey;

                localStorage.setItem('classManagerKeyConfig', JSON.stringify(keyConfig));
                modal.classList.remove('show');
            });

            // 顶部结算按钮
            document.getElementById('top-reset-exp').addEventListener('click', () => {
                if (confirm('确定要进行周结算吗？这会将所有学生的本周分累加到历史总分和余额中，并将本周分清零。')) {
                    studentsData.forEach((student, index) => {
                        student.total_score += student.week_score;
                        student.coins += student.week_score;
                        student.week_score = 0;
                        
                        const expEl = document.getElementById(`exp-text-${index}`);
                        if (expEl) {
                            expEl.innerText = `0`;
                        }
                        const gemEl = document.getElementById(`gem-text-${index}`);
                        if (gemEl) {
                            gemEl.innerText = `🪙${student.coins}`;
                        }
                    });
                    hasUnsavedChanges = true;
                }
            });

            // 顶部重新加载按钮
            document.getElementById('top-reload-cloud').addEventListener('click', () => {
                if (confirm('确定要从云端重新加载吗？未保存的更改将会丢失！')) {
                    fetch('/api/students')
                        .then(response => {
                            if (!response.ok) throw new Error('无法读取云端数据');
                            return response.json();
                        })
                        .then(data => {
                            lastCloudDataStr = JSON.stringify(data);
                            studentsData = [];
                            selectedIndices.clear();
                            parseJSON(data);
                            setupGrid();
                            hasUnsavedChanges = false;
                        })
                        .catch(err => {
                            alert('错误: ' + err.message);
                        });
                }
            });

            // 键盘快捷键支持
            window.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT') return;

                const total = studentsData.length;

                if (keyConfig.useArrows && ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                    e.preventDefault();
                    if (total === 0) return;

                    // 如果没有选中任何卡片，默认选中第一个
                    if (lastSelectedIndex < 0 || lastSelectedIndex >= total) {
                        lastSelectedIndex = 0;
                        selectStudent(0, e.ctrlKey || e.metaKey);
                        return;
                    }

                    const currentCard = document.getElementById(`card-${lastSelectedIndex}`);
                    if (!currentCard) return;

                    const currentRect = currentCard.getBoundingClientRect();
                    const currentCenterX = currentRect.left + currentRect.width / 2;
                    const currentCenterY = currentRect.top + currentRect.height / 2;

                    let bestMatchIndex = -1;
                    let minDistance = Infinity;

                    for (let i = 0; i < total; i++) {
                        if (i === lastSelectedIndex) continue;
                        const targetCard = document.getElementById(`card-${i}`);
                        if (!targetCard) continue;

                        const targetRect = targetCard.getBoundingClientRect();
                        const targetCenterX = targetRect.left + targetRect.width / 2;
                        const targetCenterY = targetRect.top + targetRect.height / 2;

                        const dx = targetCenterX - currentCenterX;
                        const dy = targetCenterY - currentCenterY;

                        let isCandidate = false;
                        let distance = 0;

                        // 设定一个容差角度，避免必须完全水平或垂直
                        const angle = Math.atan2(dy, dx) * 180 / Math.PI;

                        if (e.key === 'ArrowRight') {
                            // 右侧：角度在 -45 到 45 之间
                            if (dx > 0 && angle > -45 && angle < 45) {
                                isCandidate = true;
                                distance = Math.sqrt(dx*dx + dy*dy*4); // 增加 Y 轴权重，优先找水平方向最近的
                            }
                        } else if (e.key === 'ArrowLeft') {
                            // 左侧：角度在 135 到 180 或 -180 到 -135 之间
                            if (dx < 0 && (angle > 135 || angle < -135)) {
                                isCandidate = true;
                                distance = Math.sqrt(dx*dx + dy*dy*4);
                            }
                        } else if (e.key === 'ArrowDown') {
                            // 下方：角度在 45 到 135 之间
                            if (dy > 0 && angle > 45 && angle < 135) {
                                isCandidate = true;
                                distance = Math.sqrt(dx*dx*4 + dy*dy); // 增加 X 轴权重，优先找垂直方向最近的
                            }
                        } else if (e.key === 'ArrowUp') {
                            // 上方：角度在 -135 到 -45 之间
                            if (dy < 0 && angle > -135 && angle < -45) {
                                isCandidate = true;
                                distance = Math.sqrt(dx*dx*4 + dy*dy);
                            }
                        }

                        if (isCandidate && distance < minDistance) {
                            minDistance = distance;
                            bestMatchIndex = i;
                        }
                    }

                    if (bestMatchIndex !== -1) {
                        lastSelectedIndex = bestMatchIndex;
                        selectStudent(bestMatchIndex, e.ctrlKey || e.metaKey);
                    }
                } else if (keyConfig.useSpace && e.key === ' ') {
                    e.preventDefault();
                    toggleLock();
                } else if (e.key.toLowerCase() === keyConfig.keyUp || e.key === '+' || e.key === '=') {
                    handleSelectedScore(10);
                } else if (e.key.toLowerCase() === keyConfig.keyDown || e.key === '-' || e.key === '_') {
                    handleSelectedScore(-10);
                }
            });
        });

        function parseJSON(data) {
            let studentsArray = data;
            if (!Array.isArray(data)) {
                if (data && data.students) {
                    studentsArray = data.students;
                    if (data.grid) {
                        document.getElementById('rows-input').value = data.grid.rows || 7;
                        document.getElementById('cols-input').value = data.grid.cols || 7;
                    }
                } else {
                    return;
                }
            }
            studentsArray.forEach(item => {
                let student = { ...item };
                student.week_score = parseInt(student.week_score) || 0;
                student.total_score = parseInt(student.total_score) || 0;
                student.coins = parseInt(student.coins) || 0;
                student.isLocked = false; 
                studentsData.push(student);
            });
        }

        function setupGrid() {
            const rows = parseInt(document.getElementById('rows-input').value) || 7;
            const cols = parseInt(document.getElementById('cols-input').value) || 7;
            
            const gridLayer = document.getElementById('grid-layer');
            
            // 恢复 100% 宽高，移除超出屏幕的滚动
            gridLayer.style.width = '';
            gridLayer.style.height = '';
            
            gridLayer.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
            gridLayer.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            gridLayer.style.gap = '24px'; 
            
            gridLayer.innerHTML = '';
            for(let i = 0; i < rows * cols; i++) {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                gridLayer.appendChild(cell);
            }

            renderCards(rows, cols);
        }

        function alignCards() {
            const rows = parseInt(document.getElementById('rows-input').value) || 7;
            const cols = parseInt(document.getElementById('cols-input').value) || 7;
            const canvas = document.getElementById('canvas');
            const cellWidth = (canvas.clientWidth - 48 - (cols - 1) * 24) / cols;
            const cellHeight = (canvas.clientHeight - 48 - (rows - 1) * 24) / rows;

            hasUnsavedChanges = true; // 对齐操作会改变位置，标记为未保存

            // 记录每个格子已经被占用的情况
            const occupiedCells = new Set();

            // 按照卡片的 z-index 排序，z-index 小的（在下面的）优先占据目标格子，上面的卡片会被挤走
            const sortedIndices = Array.from({ length: studentsData.length }, (_, i) => i).sort((a, b) => {
                const cardA = document.getElementById(`card-${a}`);
                const cardB = document.getElementById(`card-${b}`);
                const zA = cardA ? parseInt(window.getComputedStyle(cardA).zIndex) || 0 : 0;
                const zB = cardB ? parseInt(window.getComputedStyle(cardB).zIndex) || 0 : 0;
                return zA - zB; // 升序，z-index 小的在前
            });

            sortedIndices.forEach(index => {
                const student = studentsData[index];
                const card = document.getElementById(`card-${index}`);
                if (!card) return;
                
                const currentLeft = card.offsetLeft;
                const currentTop = card.offsetTop;
                
                let targetCol = Math.round((currentLeft - 24) / (cellWidth + 24));
                let targetRow = Math.round((currentTop - 24) / (cellHeight + 24));
                
                targetCol = Math.max(0, Math.min(targetCol, cols - 1));
                targetRow = Math.max(0, Math.min(targetRow, rows - 1));
                
                // 如果目标格子已经被占用，则寻找最近的空闲格子
                if (occupiedCells.has(`${targetRow},${targetCol}`)) {
                    let found = false;
                    let radius = 1;
                    while (!found && radius < Math.max(rows, cols)) {
                        for (let r = Math.max(0, targetRow - radius); r <= Math.min(rows - 1, targetRow + radius); r++) {
                            for (let c = Math.max(0, targetCol - radius); c <= Math.min(cols - 1, targetCol + radius); c++) {
                                if (!occupiedCells.has(`${r},${c}`)) {
                                    targetRow = r;
                                    targetCol = c;
                                    found = true;
                                    break;
                                }
                            }
                            if (found) break;
                        }
                        radius++;
                    }
                }

                occupiedCells.add(`${targetRow},${targetCol}`);

                const newLeftPx = 24 + targetCol * (cellWidth + 24);
                const newTopPx = 24 + targetRow * (cellHeight + 24);
                
                const leftPercent = (newLeftPx / canvas.clientWidth) * 100 + '%';
                const topPercent = (newTopPx / canvas.clientHeight) * 100 + '%';
                
                // 添加过渡动画让吸附更平滑
                card.style.transition = 'left 0.3s ease, top 0.3s ease';
                card.style.left = leftPercent;
                card.style.top = topPercent;
                
                // 动画结束后移除 transition，以免影响后续的自由拖拽
                setTimeout(() => {
                    card.style.transition = '';
                }, 300);

                student.left = leftPercent;
                student.top = topPercent;
            });
        }

        function renderCards(rows, cols) {
            const cardsLayer = document.getElementById('cards-layer');
            cardsLayer.innerHTML = '';
            const canvas = document.getElementById('canvas');

            let cellWidth = (canvas.clientWidth - 48 - (cols - 1) * 24) / cols;
            let cellHeight = (canvas.clientHeight - 48 - (rows - 1) * 24) / rows;

            studentsData.forEach((student, index) => {
                const card = document.createElement('div');
                card.id = `card-${index}`;
                card.className = `student-card`;
                
                card.style.width = cellWidth + 'px';
                card.style.height = cellHeight + 'px';
                
                // 🛠️ 优化字号，防止 iPad Mini 截断
                const nameSize = Math.max(12, Math.min(20, cellHeight * 0.22));
                const scoreSize = Math.max(20, Math.min(40, cellHeight * 0.4));

                if (student.class && student.class.toUpperCase() === '7A') card.classList.add('card-7A');
                if (student.class && student.class.toUpperCase() === '8B') card.classList.add('card-8B');
                if (student.isLocked) card.classList.add('locked');
                if (selectedIndices.has(index)) card.classList.add('selected');

                const colIndex = index % cols;
                const rowIndex = Math.floor(index / cols);
                const initLeftPx = 24 + colIndex * (cellWidth + 24);
                const initTopPx = 24 + rowIndex * (cellHeight + 24);
                
                if (student.left && student.left.toString().endsWith('%')) {
                    card.style.left = student.left;
                    card.style.top = student.top;
                } else {
                    // Convert legacy px to % or use init
                    const leftPx = student.left ? parseFloat(student.left) : initLeftPx;
                    const topPx = student.top ? parseFloat(student.top) : initTopPx;
                    card.style.left = (leftPx / canvas.clientWidth) * 100 + '%';
                    card.style.top = (topPx / canvas.clientHeight) * 100 + '%';
                }

                let badgeHTML = '';
                let lockHTML = student.isLocked ? `<div class="lock-icon">🔒</div>` : '';
                let statusHTML = '';
                
                if (student.status && student.status.trim().length > 0) {
                    const statusStr = student.status.replace(/"/g, '');
                    const items = statusStr.split(/[，,]/).map(s => s.trim()).filter(s => s.length > 0);
                    if (items.length > 0) {
                        badgeHTML = `<div class="status-badge" id="badge-${index}">${items.length}</div>`;
                        items.forEach(item => {
                            statusHTML += `<div class="status-text" data-item="${item}">${item}</div>`;
                        });
                    }
                }

                // 🛠️ 学号半透明衬在名字下面
                card.innerHTML = `
                    ${badgeHTML}
                    ${lockHTML}
                    <div class="card-top-status">${statusHTML}</div>
                    <div class="card-bottom-main">
                        <div class="info-left-box" style="padding-left: 2px;">
                            <div class="info-id" style="font-size: ${nameSize * 2.5}px">${student.id}</div>
                            <div class="info-name" style="font-size: ${nameSize}px; padding-left: 4px;">${student.name}</div>
                        </div>
                        <div style="display: flex; flex-direction: column; align-items: flex-end; justify-content: center;">
                            <div class="student-score" id="exp-text-${index}" style="font-size: ${scoreSize * 0.8}px; color: #000000; line-height: 1.1; font-weight: 900;">${student.week_score}</div>
                            <div class="student-score" id="gem-text-${index}" style="font-size: ${scoreSize * 0.4}px; color: #94a3b8; line-height: 1.1;">🪙${student.coins}</div>
                        </div>
                    </div>
                `;

                // 鼠标事件绑定
                card.addEventListener('mousedown', (e) => {
                    if (!currentTool) {
                        // 默认选择/拖拽模式
                        lastSelectedIndex = index;
                        selectStudent(index, e.ctrlKey || e.metaKey);
                        if (student.isLocked) return;
                        startDrag(e, card);
                    } else {
                        // 画笔模式：点按即生效，并开启涂抹
                        isPainting = true;
                        paintedIndices.clear();
                        applyToolAction(index);
                    }
                });

                // 鼠标滑过事件（用于涂抹）
                card.addEventListener('mouseenter', (e) => {
                    if (isPainting && currentTool) {
                        applyToolAction(index);
                    }
                });

                // 触摸事件绑定 (移动端支持)
                card.addEventListener('touchstart', (e) => {
                    if (!currentTool) {
                        // 阻止默认行为，防止触发滚动或模拟点击
                        e.preventDefault();
                        lastSelectedIndex = index;
                        selectStudent(index, false);
                        if (student.isLocked) return;
                        startDrag(e.touches[0], card, true);
                    } else {
                        e.preventDefault();
                        isPainting = true;
                        paintedIndices.clear();
                        applyToolAction(index);
                    }
                }, { passive: false });

                card.addEventListener('touchmove', (e) => {
                    if (isPainting && currentTool) {
                        e.preventDefault(); // 防止滚动
                        const touch = e.touches[0];
                        const targetElement = document.elementFromPoint(touch.clientX, touch.clientY);
                        if (targetElement) {
                            const targetCard = targetElement.closest('.student-card');
                            if (targetCard) {
                                const targetIndex = parseInt(targetCard.id.split('-')[1]);
                                if (!isNaN(targetIndex)) {
                                    applyToolAction(targetIndex);
                                }
                            }
                        }
                    }
                }, { passive: false });

                card.addEventListener('touchend', () => {
                    if (isPainting) {
                        isPainting = false;
                        paintedIndices.clear();
                    }
                });

                // 双击消除作业
                const statusElements = card.querySelectorAll('.status-text');
                statusElements.forEach(el => {
                    el.addEventListener('dblclick', (e) => {
                        e.stopPropagation();
                        const itemText = el.getAttribute('data-item');
                        removeHomework(index, itemText, el);
                    });
                    // 阻止作业标签的 mousedown 冒泡，防止触发拖拽
                    el.addEventListener('mousedown', (e) => e.stopPropagation());
                });

                cardsLayer.appendChild(card);
            });
        }

        function removeHomework(studentIndex, itemText, element) {
            const student = studentsData[studentIndex];
            if (!student.status) return;
            
            let items = student.status.replace(/"/g, '').split(/[，,]/).map(s => s.trim()).filter(s => s.length > 0);
            const itemIdx = items.indexOf(itemText);
            if (itemIdx > -1) {
                items.splice(itemIdx, 1);
                student.status = items.join('，');
                element.remove();
                hasUnsavedChanges = true; // 标记为未保存
                
                const badge = document.getElementById(`badge-${studentIndex}`);
                if (badge) {
                    if (items.length > 0) {
                        badge.innerText = items.length;
                    } else {
                        badge.remove();
                    }
                }
            }
        }

        async function saveToCloud() {
            if (studentsData.length === 0) return;
            
            const btn = document.getElementById('save-btn');
            const originalText = btn.innerText;
            btn.innerText = '⏳ 保存中...';
            
            try {
                // 过滤掉不需要保存到云端的字段，比如 isLocked
                const dataToSave = studentsData.map(student => {
                    const { isLocked, ...rest } = student;
                    return rest;
                });

                const payload = {
                    grid: {
                        rows: parseInt(document.getElementById('rows-input').value) || 7,
                        cols: parseInt(document.getElementById('cols-input').value) || 7
                    },
                    students: dataToSave
                };

                const response = await fetch('/api/students', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error('云端保存失败');
                }

                lastCloudDataStr = JSON.stringify(payload);
                btn.innerText = '✅ 成功';
                hasUnsavedChanges = false; // 保存成功，重置标记
                setTimeout(() => btn.innerText = originalText, 2000);
            } catch (err) {
                btn.innerText = '❌ 失败';
                setTimeout(() => btn.innerText = originalText, 2000);
                alert('保存失败: ' + err.message);
            }
        }

        function selectStudent(index, isMulti = false) {
            if (!isMulti) {
                clearSelection();
            }
            
            if (selectedIndices.has(index)) {
                if (isMulti) {
                    selectedIndices.delete(index);
                    const card = document.getElementById(`card-${index}`);
                    if (card) card.classList.remove('selected');
                }
            } else {
                selectedIndices.add(index);
                const card = document.getElementById(`card-${index}`);
                if (card) card.classList.add('selected');
            }
        }

        function clearSelection() {
            document.querySelectorAll('.student-card').forEach(c => c.classList.remove('selected'));
            selectedIndices.clear();
        }

        function toggleLock() {
            if (selectedIndices.size === 0) return;
            let changed = false;
            selectedIndices.forEach(index => {
                const student = studentsData[index];
                student.isLocked = !student.isLocked;
                changed = true;
                
                const card = document.getElementById(`card-${index}`);
                if (card) {
                    if (student.isLocked) {
                        card.classList.add('locked');
                        if (!card.querySelector('.lock-icon')) {
                            const lockIcon = document.createElement('div');
                            lockIcon.className = 'lock-icon';
                            lockIcon.innerText = '🔒';
                            card.insertBefore(lockIcon, card.firstChild);
                        }
                    } else {
                        card.classList.remove('locked');
                        const lockIcon = card.querySelector('.lock-icon');
                        if (lockIcon) lockIcon.remove();
                    }
                }
            });
            if (changed) hasUnsavedChanges = true; // 标记为未保存
        }

        function exitToolMode() {
            currentTool = null;
            document.querySelectorAll('.tool-btn').forEach(b => {
                b.classList.remove('active');
                b.style.boxShadow = 'none';
            });
            document.getElementById('cursor-follower').style.display = 'none';
        }

        function applyToolAction(index) {
            if (paintedIndices.has(index)) return; // 避免重复操作
            
            const student = studentsData[index];
            if (student.isLocked) return;
            
            paintedIndices.add(index);
            
            if (currentTool === 'plus') {
                updateSingleScore(index, 10);
            } else if (currentTool === 'minus') {
                updateSingleScore(index, -10);
            } else if (currentTool === 'consume') {
                consumeSingleGem(index, 100);
            }
        }

        function updateSingleScore(index, delta) {
            const student = studentsData[index];
            student.week_score += delta;
            hasUnsavedChanges = true;
            
            const expEl = document.getElementById(`exp-text-${index}`);
            if (expEl) {
                expEl.innerText = `${student.week_score}`;
            }

            const card = document.getElementById(`card-${index}`);
            if (card) {
                showFloatingNum(card.offsetLeft + card.clientWidth - 25, card.offsetTop + card.clientHeight / 2, delta);
            }
        }

        function consumeSingleGem(index, amount) {
            const student = studentsData[index];
            if (student.coins < amount) {
                const card = document.getElementById(`card-${index}`);
                if (card) {
                    showFloatingText(card.offsetLeft + card.clientWidth / 2, card.offsetTop + card.clientHeight / 2, '余额不足', '#ef4444');
                }
                return;
            }

            student.coins -= amount;
            hasUnsavedChanges = true;
            
            const gemEl = document.getElementById(`gem-text-${index}`);
            if (gemEl) {
                gemEl.innerText = `🪙${student.coins}`;
            }

            const card = document.getElementById(`card-${index}`);
            if (card) {
                showFloatingNum(card.offsetLeft + card.clientWidth - 25, card.offsetTop + card.clientHeight / 2, -amount, '#eab308');
            }
        }

        function handleSelectedScore(delta) {
            if (selectedIndices.size === 0) return;
            selectedIndices.forEach(index => {
                if (!studentsData[index].isLocked) {
                    updateSingleScore(index, delta);
                }
            });
        }

        function handleAllScore(delta) {
            let changed = false;
            studentsData.forEach((student, index) => {
                if (student.isLocked) return; 
                student.week_score += delta;
                changed = true;
                
                const expEl = document.getElementById(`exp-text-${index}`);
                if (expEl) {
                    expEl.innerText = `${student.week_score}`;
                }

                const card = document.getElementById(`card-${index}`);
                if (card) {
                    showFloatingNum(card.offsetLeft + card.clientWidth - 25, card.offsetTop + card.clientHeight / 2, delta);
                }
            });
            if (changed) hasUnsavedChanges = true; // 标记为未保存
        }

        function showFloatingNum(left, top, delta, customColor = null) {
            const num = document.createElement('div');
            num.className = 'floating-num';
            num.innerText = delta > 0 ? `+${delta}` : `${delta}`;
            num.style.color = customColor ? customColor : (delta > 0 ? '#10b981' : '#ef4444');
            num.style.left = left + 'px';
            num.style.top = top + 'px';
            document.getElementById('canvas').appendChild(num);
            setTimeout(() => num.remove(), 600);
        }

        function showFloatingText(left, top, text, color) {
            const el = document.createElement('div');
            el.className = 'floating-num';
            el.innerText = text;
            el.style.color = color;
            el.style.left = left + 'px';
            el.style.top = top + 'px';
            el.style.transform = 'translate(-50%, -50%)';
            document.getElementById('canvas').appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        let isTouchDrag = false;

        function startDrag(e, card, isTouch = false) {
            activeCard = card;
            isTouchDrag = isTouch;
            document.querySelectorAll('.student-card').forEach(c => c.style.zIndex = 10);
            card.style.zIndex = 100;

            const canvas = document.getElementById('canvas');
            // 考虑 canvas 的滚动偏移量
            offsetX = e.clientX + canvas.scrollLeft - card.offsetLeft;
            offsetY = e.clientY + canvas.scrollTop - card.offsetTop;

            if (isTouch) {
                document.addEventListener('touchmove', dragMove, { passive: false });
                document.addEventListener('touchend', endDrag);
            } else {
                document.addEventListener('mousemove', dragMove);
                document.addEventListener('mouseup', endDrag);
            }
        }

        function dragMove(e) {
            if (!activeCard) return;
            
            if (isTouchDrag) {
                e.preventDefault(); // 阻止触摸拖拽时的页面滚动
            }

            const clientX = isTouchDrag ? e.touches[0].clientX : e.clientX;
            const clientY = isTouchDrag ? e.touches[0].clientY : e.clientY;
            
            const canvas = document.getElementById('canvas');
            
            let x = clientX + canvas.scrollLeft - offsetX;
            let y = clientY + canvas.scrollTop - offsetY;
            
            // 限制在 grid-layer 的范围内，而不是可视区域内
            const gridLayer = document.getElementById('grid-layer');
            const maxX = gridLayer.clientWidth + 48 - activeCard.clientWidth;
            const maxY = gridLayer.clientHeight + 48 - activeCard.clientHeight;

            x = Math.max(0, Math.min(x, maxX));
            y = Math.max(0, Math.min(y, maxY));

            activeCard.style.left = x + 'px';
            activeCard.style.top = y + 'px';
        }

        function endDrag() {
            if (activeCard) {
                const index = parseInt(activeCard.id.split('-')[1]);
                if (!isNaN(index) && studentsData[index]) {
                    const canvas = document.getElementById('canvas');
                    const currentLeftPx = parseFloat(activeCard.style.left);
                    const currentTopPx = parseFloat(activeCard.style.top);
                    
                    const leftPercent = (currentLeftPx / canvas.clientWidth) * 100 + '%';
                    const topPercent = (currentTopPx / canvas.clientHeight) * 100 + '%';
                    
                    activeCard.style.left = leftPercent;
                    activeCard.style.top = topPercent;

                    // 只有位置真正改变了才标记为未保存
                    if (studentsData[index].left !== leftPercent || studentsData[index].top !== topPercent) {
                        studentsData[index].left = leftPercent;
                        studentsData[index].top = topPercent;
                        hasUnsavedChanges = true; // 标记为未保存
                    }
                }
            }
            activeCard = null;
            if (isTouchDrag) {
                document.removeEventListener('touchmove', dragMove);
                document.removeEventListener('touchend', endDrag);
            } else {
                document.removeEventListener('mousemove', dragMove);
                document.removeEventListener('mouseup', endDrag);
            }
            isTouchDrag = false;
        }
    </script>
